name: fruitsgame
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  audioplayers: ^6.6.0
  vibration: ^3.1.8
  shared_preferences: ^2.5.5
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1   # ✅ AJOUT ICI

flutter:
  uses-material-design: true

  assets:
    - assets/images/apple.png
    - assets/images/banana.png
    - assets/images/orange.jpg
    - assets/images/strawberry.jpg
    - assets/images/grape.jpg
    - assets/images/pineapple.jpg
    - assets/images/mango.jpg
    - assets/images/cherry.png
    - assets/images/watermelon.png
    - assets/images/bananacon.png
    - assets/images/applecon.png
    - assets/images/orangecon.png
    - assets/images/ananacon.png
    - assets/images/logo.png
    - assets/sounds/click.wav
    - assets/sounds/error.wav
    - assets/sounds/success.wav
    - assets/sounds/bg_music.wav

# ✅ DOIT ÊTRE ICI (PAS DANS flutter)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

  